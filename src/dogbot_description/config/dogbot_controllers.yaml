controller_manager:
  ros__parameters:
    update_rate: 100 # Hz
    use_sim_time: true

    # "Sprawozdawca" stanu stawów
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # "Siłacz" trzymający stawy
    quadruped_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

quadruped_joint_trajectory_controller:
  ros__parameters:
    joints:
      - front_left_hip
      - front_left_knee
      - front_right_hip
      - front_right_knee
      - rear_left_hip
      - rear_left_knee
      - rear_right_hip
      - rear_right_knee

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    gains:
          front_left_hip: {p: 1000.0, i: 1.0, d: 10.0}
          front_left_knee: {p: 1000.0, i: 1.0, d: 10.0}
          front_right_hip: {p: 1000.0, i: 1.0, d: 10.0}
          front_right_knee: {p: 1000.0, i: 1.0, d: 10.0}
          rear_left_hip: {p: 1000.0, i: 1.0, d: 10.0}
          rear_left_knee: {p: 1000.0, i: 1.0, d: 10.0}
          rear_right_hip: {p: 1000.0, i: 1.0, d: 10.0}
          rear_right_knee: {p: 1000.0, i: 1.0, d: 10.0}