# dogbot_bridge.yaml - Konfiguracja mostkowania ROS 2 <-> Gazebo dla "Pies Robot"

bridges:
  # --- 1. Podstawowe Dane Symulacji (Gazebo -> ROS 2) ---
  
  # Zegar symulacji (KRYTYCZNE, gdy używasz use_sim_time: true)
  - ros_topic_name: "clock"
    gz_topic_name: "/clock"
    ros_type_name: "rosgraph_msgs/msg/Clock"
    gz_type_name: "gz.msgs.Clock"
    direction: GZ_TO_ROS

  # Transformacje (TF) od Gazebo (np. położenie modelu)
  - ros_topic_name: "tf"
    gz_topic_name: "/tf"
    ros_type_name: "tf2_msgs/msg/TFMessage"
    gz_type_name: "gz.msgs.Pose_V"
    direction: GZ_TO_ROS
    
  # --- 2. Kontrola Robota (ros2_control) ---

  # Dane stanu jointów (z Gazebo do Joint State Broadcaster ROS 2)
  # Uwaga: Nazwa tematu Gazebo musi być zgodna z wtyczką ros2_control w URDF.
  - ros_topic_name: "/joint_states"
    gz_topic_name: "/model/dogbot/joint_states" # Zmień 'dogbot' na nazwę swojego modelu!
    ros_type_name: "sensor_msgs/msg/JointState"
    gz_type_name: "gz.msgs.Model" # W Gazebo 7/Harmonic często używa się gz.msgs.Model lub konkretnego typu stanu.
    direction: GZ_TO_ROS